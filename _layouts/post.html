---
layout: default
---
<article class="post">

  <header class="post-header">
    <span class="post-meta">{{ page.date | date: "%Y &mdash; %m &mdash; %d" }}{% if page.author %} &middot; {{ page.author }}{% endif %}</span>
    <h1 class="post-title">{{ page.title }}</h1>
  </header>

  <div class="post-content">
    {{ content }}
  </div>

</article>
